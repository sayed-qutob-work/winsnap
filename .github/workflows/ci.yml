name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test on windows-latest / Python ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python --version

      - name: Compile-check every Python file
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Filter *.py -File `
            -Path .,modules,tests `
            -ErrorAction SilentlyContinue
          python -m py_compile @($files.FullName)

      - name: Run smoke tests
        run: python tests/smoke_apps.py

      - name: Verify export --help works
        run: python export.py --help

      - name: Verify restore --help works
        run: python restore.py --help

      - name: Verify build --help works
        run: python build.py --help

  build-exe:
    name: Build standalone .exe (smoke)
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .exe
        run: python build.py

      - name: List dist/
        shell: pwsh
        run: Get-ChildItem dist/ -Recurse | Select-Object FullName, Length

      - name: Verify produced .exe runs
        shell: pwsh
        run: |
          .\dist\winsnap-export.exe --help
          .\dist\winsnap-restore.exe --help

      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: winsnap-windows-exe
          path: |
            dist/winsnap-export.exe
            dist/winsnap-restore.exe
          retention-days: 14
